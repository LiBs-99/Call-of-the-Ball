            margin: 0;

            overflow: hidden;
            height: 100%;
            background: #05050a;
        }

            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            touch-action: none;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2), 0 0 80px rgba(255, 0, 128, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        // ---------- Game State ----------
        let gameState = 'menu';
        let currentLevel = -1;
        let skinIndex = 0;
        let deathCount = 0;
        let unlockedSkins = [true, false, false, false];
        let invincibleTimer = 0;
        const INVINCIBLE_DURATION = 60;

        // ---------- Ball ----------
        const ball = {
            x: 120, y: height / 2,
            radius: 18,
            vx: 0, vy: 0,
            gravityDir: 1,
            grounded: false,
            angle: 0,
            flipCooldown: 0

        const gravityStrength = 0.55;
        const maxFallSpeed = 12;
        const FLIP_COOLDOWN = 18;

        // ---------- World ----------
        let worldOffset = 0;
        let finishX = 3500;
        let platforms = [];
        let obstacles = [];
        let checkpointX = 120;

        // ---------- Decorations ----------
        let bgStars = [];
        let bgShapes = [];
        let sparkles = [];
        let deathParticles = [];
        let flipParticles = [];

        function generateBackground() {
            bgStars = [];
            for (let i = 0; i < 100; i++) {
                bgStars.push({
                    x: Math.random() * width, y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.3,
                    speedX: (Math.random() - 0.5) * 0.1,
                    speedY: (Math.random() - 0.5) * 0.1,
                    alpha: Math.random() * 0.5 + 0.5
                });
            }
            bgShapes = [];
            for (let i = 0; i < 8; i++) {
                bgShapes.push({
                    x: Math.random() * width, y: Math.random() * height,
                    size: Math.random() * 150 + 50,
                    speed: Math.random() * 0.3 + 0.1,
                    color: Math.random() > 0.5 ? 'rgba(0, 242, 255, 0.05)' : 'rgba(255, 0, 128, 0.05)'
                });
            }
            sparkles = [];
            for (let i = 0; i < 40; i++) {
                sparkles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.4 + 0.1,
                    alpha: Math.random() * 0.6 + 0.2,
                    life: Math.random()
                });
            }
        }
        generateBackground();

        let trail = [];
        const maxTrailLength = 12;

        // ---------- Checkpoints per level ----------
        const checkpointPositions = [
            [120, 1050, 1850, 2650],
            [120, 950, 1750, 2550],
            [120, 850, 1650, 2450]

        // ---------- Level Data ----------
        // Ceiling spikes (pointing: 'down') hang from roof.
        // Platform spikes (pointing: 'up') sit on platforms.

            ],

            // ===== HARD =====
            // Narrow platforms, many spikes. Lots of threading — ceiling spikes above platform spikes.
            [
                { type: 'platform', x: 0, y: 400, w: 170, h: 15 },
                { type: 'platform', x: 270, y: 330, w: 130, h: 15 },
                { type: 'platform', x: 500, y: 260, w: 130, h: 15 },
                { type: 'platform', x: 730, y: 350, w: 140, h: 15 },

                { type: 'platform', x: 1200, y: 190, w: 130, h: 15 },
                { type: 'platform', x: 1430, y: 310, w: 140, h: 15 },
                { type: 'platform', x: 1660, y: 240, w: 130, h: 15 },
                { type: 'platform', x: 1890, y: 370, w: 140, h: 15 },
                { type: 'platform', x: 2120, y: 290, w: 130, h: 15 },
                { type: 'platform', x: 2350, y: 210, w: 130, h: 15 },
                { type: 'platform', x: 2580, y: 330, w: 140, h: 15 },
                { type: 'platform', x: 2810, y: 250, w: 130, h: 15 },
                { type: 'platform', x: 3040, y: 350, w: 140, h: 15 },
                { type: 'platform', x: 3270, y: 300, w: 260, h: 15 },

                // Platform spikes (up) — on most platforms, right side
                { type: 'obstacle', x: 350, y: 280, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 575, y: 212, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 815, y: 302, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 1035, y: 222, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 1270, y: 142, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 1510, y: 262, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 1730, y: 192, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 1970, y: 322, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 2190, y: 242, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 2430, y: 162, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 2660, y: 282, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 2890, y: 202, w: 22, h: 48, pointing: 'up' },
                { type: 'obstacle', x: 3120, y: 302, w: 22, h: 48, pointing: 'up' },

                // Ceiling spikes in air gaps
                { type: 'obstacle', x: 210, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 440, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 910, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 1140, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 1370, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 1600, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 2070, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 2300, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 2760, y: 0, w: 25, h: 35, pointing: 'down' },
                { type: 'obstacle', x: 2990, y: 0, w: 25, h: 35, pointing: 'down' },

                // Threading: ceiling spike directly above platform spike
                // Above x=575, plat y=260 → tip y=212, gap=177px
                { type: 'obstacle', x: 570, y: 0, w: 25, h: 35, pointing: 'down' },
                // Above x=1270, plat y=190 → tip y=142, gap=107px
                { type: 'obstacle', x: 1265, y: 0, w: 25, h: 35, pointing: 'down' },
                // Above x=2430, plat y=210 → tip y=162, gap=127px
                { type: 'obstacle', x: 2425, y: 0, w: 25, h: 35, pointing: 'down' },
                // Above x=2890, plat y=250 → tip y=202, gap=167px
                { type: 'obstacle', x: 2885, y: 0, w: 25, h: 35, pointing: 'down' }
            ]
        ];

        // ---------- Input ----------
        const keys = {};
        window.addEventListener('keydown', function(e) {
            keys[e.code] = true;
            if (e.code === 'Space') { e.preventDefault(); attemptFlip(); }
            if (e.code === 'KeyP') togglePause();
        });
        window.addEventListener('keyup', function(e) { keys[e.code] = false; });
        canvas.addEventListener('pointerdown', handlePointerDown);

        function handlePointerDown(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            if (gameState === 'menu') {
                handleMenuClick(mx, my);
            } else if (gameState === 'playing') {
                if (mx >= width - 105 && mx <= width - 5 && my >= 5 && my <= 55) {
                    togglePause();
                } else {
                    attemptFlip();
                }
            } else if (gameState === 'paused') {
                const btnW = 180, btnH = 50, gap = 20;
                const totalW = btnW * 2 + gap;
                const startX = (width - totalW) / 2;
                const btnY = height / 2 + 20;
                if (mx >= startX && mx <= startX + btnW && my >= btnY && my <= btnY + btnH) {
                    togglePause();
                } else if (mx >= startX + btnW + gap && mx <= startX + btnW * 2 + gap + btnW && my >= btnY && my <= btnY + btnH) {
                    gameState = 'menu';
                }
            } else if (gameState === 'levelComplete') {
                gameState = 'menu';
            }
        }

        function handleMenuClick(mx, my) {
            const btnW = 150, btnH = 50, gap = 50;
            const totalWidth = 3 * btnW + 2 * gap;
            const startX = (width - totalWidth) / 2;
            for (let i = 0; i < 3; i++) {
                const bx = startX + i * (btnW + gap), by = 140;
                if (mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH) {
                    loadLevel(i);
                    return;
                }
            }
            for (let i = 0; i < 4; i++) {
                const sx = 90 + i * 155, sy = 250, sw = 130, sh = 55;
                if (mx >= sx && mx <= sx + sw && my >= sy && my <= sy + sh) {
                    if (unlockedSkins[i]) skinIndex = i;
                    return;
                }
            }
        }

        function togglePause() {
            if (gameState === 'playing') gameState = 'paused';
            else if (gameState === 'paused') gameState = 'playing';
        }

        function attemptFlip() {
            if (gameState !== 'playing') return;
            if (ball.flipCooldown > 0) return;

            ball.gravityDir *= -1;
            ball.vy = ball.gravityDir * 5;
            ball.flipCooldown = FLIP_COOLDOWN;
            ball.grounded = false;
            spawnFlipParticles();
        }

        function loadLevel(levelIndex) {
            currentLevel = levelIndex;
            const data = levelData[levelIndex];
            platforms = data.filter(o => o.type === 'platform').map(o => ({ ...o }));
            obstacles = data.filter(o => o.type === 'obstacle').map(o => ({ ...o }));

            ball.vx = [2.2, 3.2, 4.2][levelIndex];
            finishX = [3490, 3410, 3510][levelIndex];

            ball.x = 120;
            ball.y = 400 - ball.radius;
            ball.vy = 0;
            ball.gravityDir = 1;
            ball.grounded = true;
            ball.flipCooldown = 0;
            ball.angle = 0;

            worldOffset = 0;
            deathCount = 0;
            invincibleTimer = 0;
            checkpointX = 120;
            trail = [];
            deathParticles = [];
            flipParticles = [];

            gameState = 'playing';
        }

        // ---------- Geometry ----------
        function distToSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1, dy = y2 - y1;
            const l2 = dx * dx + dy * dy;
            if (l2 === 0) return Math.sqrt((px - x1) ** 2 + (py - y1) ** 2);
            let t = ((px - x1) * dx + (py - y1) * dy) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.sqrt((px - (x1 + t * dx)) ** 2 + (py - (y1 + t * dy)) ** 2);
        }

        // ---------- Collisions ----------
        function checkCollisions() {
            ball.grounded = false;
            const ballScreenX = ball.x - worldOffset;

            // Platforms
            for (let p of platforms) {
                const platLeft = p.x - worldOffset;
                const platRight = platLeft + p.w;
                const platTop = p.y;
                const platBottom = p.y + p.h;

                const closestX = Math.max(platLeft, Math.min(ballScreenX, platRight));
                const closestY = Math.max(platTop, Math.min(ball.y, platBottom));
                const dx = ballScreenX - closestX;
                const dy = ball.y - closestY;
                const distSq = dx * dx + dy * dy;

                if (distSq < ball.radius * ball.radius) {
                    if (distSq === 0) {
                        if (ball.gravityDir === 1) {
                            ball.y = platTop - ball.radius;
                            ball.grounded = true;
                        } else {
                            ball.y = platBottom + ball.radius;
                            ball.grounded = true;
                        }
                        ball.vy = 0;
                        continue;
                    }
                    const dist = Math.sqrt(distSq);
                    const nx = dx / dist;
                    const ny = dy / dist;

                    if (ballScreenX >= platLeft - 2 && ballScreenX <= platRight + 2) {
                        if (ny < 0) {
                            ball.y = platTop - ball.radius;
                            if (ball.gravityDir === 1) ball.grounded = true;
                        } else {
                            ball.y = platBottom + ball.radius;
                            if (ball.gravityDir === -1) ball.grounded = true;
                        }
                        ball.vy = 0;
                    } else {
                        ball.x += nx * (ball.radius - dist);
                    }
                }
            }

            // Ceiling — solid wall (bounce)
            if (ball.y - ball.radius <= 0) {
                ball.y = ball.radius;
                if (ball.gravityDir === -1 && ball.vy <= 0) {
                    ball.vy = 0;
                    ball.grounded = true;
                }
            }

            // Ground — DEATH
            if (ball.y + ball.radius > height) {
                die(ballScreenX, height);
                return;
            }

            if (ball.grounded) ball.flipCooldown = 0;

            // Spike collision — with forgiveness
            if (invincibleTimer <= 0) {
                const SPIKE_FORGIVENESS = 4;
                for (let o of obstacles) {
                    const screenX = o.x - worldOffset;
                    if (screenX + o.w < -10 || screenX > width + 10) continue;

                    let p1x, p1y, p2x, p2y, p3x, p3y;
                    if (o.pointing === 'down') {
                        p1x = screenX; p1y = o.y;
                        p2x = screenX + o.w; p2y = o.y;
                        p3x = screenX + o.w / 2; p3y = o.y + o.h;
                    } else {
                        p1x = screenX; p1y = o.y + o.h;
                        p2x = screenX + o.w; p2y = o.y + o.h;
                        p3x = screenX + o.w / 2; p3y = o.y;
                    }

                    const effectiveRadius = ball.radius - SPIKE_FORGIVENESS;
                    const d1 = distToSegment(ballScreenX, ball.y, p1x, p1y, p3x, p3y);
                    const d2 = distToSegment(ballScreenX, ball.y, p2x, p2y, p3x, p3y);

                    if (d1 < effectiveRadius || d2 < effectiveRadius) {
                        die(ballScreenX, ball.y);
                        return;
                    }
                }
            }

            // Checkpoint detection
            if (currentLevel >= 0) {
                const cps = checkpointPositions[currentLevel];
                for (let cp of cps) {
                    if (ball.x >= cp - 10 && ball.x <= cp + 10 && checkpointX < cp) {
                        checkpointX = cp;
                    }
                }
            }

            // Finish
            if (ball.x >= finishX) {
                gameState = 'levelComplete';
                if (currentLevel === 0) unlockedSkins[1] = true;
                if (currentLevel === 1) unlockedSkins[2] = true;
                if (currentLevel === 2) unlockedSkins[3] = true;
            }
        }

        function die(screenX, screenY) {
            deathCount++;
            spawnDeathParticles(screenX, screenY);
            resetBall();
        }

        function spawnDeathParticles(screenX, screenY) {
            for (let i = 0; i < 24; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 6;
                deathParticles.push({
                    x: screenX, y: screenY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    size: 3 + Math.random() * 5,
                    alpha: 1,
                    color: Math.random() > 0.5 ? '#ff0055' : '#ffaa00'
                });
            }
        }

        function spawnFlipParticles() {
            for (let i = 0; i < 12; i++) {
                flipParticles.push({
                    x: ball.x - worldOffset, y: ball.y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -ball.gravityDir * (Math.random() * 3 + 1),
                    size: 2 + Math.random() * 3,
                    alpha: 1,
                    color: '#00f2ff'
                });
            }
        }

        function resetBall() {
            ball.x = checkpointX;
            // Find nearest platform to respawn ON
            let bestPlatform = null;
            let bestDist = Infinity;
            for (let p of platforms) {
                if (ball.x >= p.x && ball.x <= p.x + p.w) {
                    bestPlatform = p;
                    break;
                }
                const dist = Math.abs(ball.x - (p.x + p.w / 2));
                if (dist < bestDist) { bestDist = dist; bestPlatform = p; }
            }
            if (bestPlatform) {
                ball.x = Math.max(bestPlatform.x + ball.radius + 5, Math.min(bestPlatform.x + bestPlatform.w - ball.radius - 5, ball.x));
                ball.y = bestPlatform.y - ball.radius;
                ball.grounded = true;
            } else {
                ball.y = height / 2;
                ball.grounded = false;
            }
            ball.vy = 0;
            ball.gravityDir = 1;
            ball.flipCooldown = 0;
            ball.angle = 0;
            worldOffset = Math.max(0, ball.x - width / 2);
            trail = [];
            invincibleTimer = INVINCIBLE_DURATION;
        }

        // ---------- Update ----------
        function update() {
            if (gameState !== 'playing') return;

            if (invincibleTimer > 0) invincibleTimer--;
            if (ball.flipCooldown > 0) ball.flipCooldown--;

            for (let i = deathParticles.length - 1; i >= 0; i--) {
                const p = deathParticles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.15; p.alpha -= 0.022;
                if (p.alpha <= 0) deathParticles.splice(i, 1);
            }
            for (let i = flipParticles.length - 1; i >= 0; i--) {
                const p = flipParticles[i];
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.2; p.alpha -= 0.05;
                if (p.alpha <= 0) flipParticles.splice(i, 1);
            }

            if (keys['ArrowLeft'] || keys['KeyA']) ball.x -= 2.5;
            if (keys['ArrowRight'] || keys['KeyD']) ball.x += 2.5;

            ball.x += ball.vx;
            if (ball.x < 0) ball.x = 0;

            worldOffset = Math.max(0, ball.x - width / 2);

            ball.vy += gravityStrength * ball.gravityDir;
            if (Math.abs(ball.vy) > maxFallSpeed) ball.vy = Math.sign(ball.vy) * maxFallSpeed;
            ball.y += ball.vy;
            ball.angle += ball.vx / ball.radius * ball.gravityDir;

            checkCollisions();

            trail.push({ x: ball.x - worldOffset, y: ball.y, radius: ball.radius });
            if (trail.length > maxTrailLength) trail.shift();

            for (let s of sparkles) {
                s.y -= s.speed;
                s.life += 0.01;
                if (s.life > 1) { s.life = 0; s.y = height + 5; s.x = Math.random() * width; }
            }
            for (let s of bgShapes) {
                s.x -= s.speed;
                if (s.x + s.size < 0) s.x = width + s.size;
            }
        }

        // ---------- Drawing ----------
        function drawBackground() {
            const topColor = ball.gravityDir === 1 ? '#0a0a2e' : '#2e0a2e';
            const bottomColor = ball.gravityDir === 1 ? '#1a1a4e' : '#4e1a4e';
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, topColor);
            grad.addColorStop(1, bottomColor);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            for (let s of bgShapes) {
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGrid() {
            const gridOffset = worldOffset % 50;
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = -gridOffset; i < width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
            }
            for (let j = 0; j < height; j += 50) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(width, j); ctx.stroke();
            }
        }

        function drawBgStars() {
            for (let s of bgStars) {
                s.x += s.speedX; s.y += s.speedY;
                if (s.x < 0) s.x = width; if (s.x > width) s.x = 0;
                if (s.y < 0) s.y = height; if (s.y > height) s.y = 0;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,' + s.alpha + ')';
                ctx.fill();
            }
        }

        function drawSparkles() {
            for (let s of sparkles) {
                const alpha = Math.sin(s.life * Math.PI) * 0.6 + 0.2;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,215,0,' + alpha + ')';
                ctx.fill();
            }
        }

        // Red death zone at the bottom
        function drawDeathZone() {
            // Gradient glow
            const grad = ctx.createLinearGradient(0, height - 70, 0, height);
            grad.addColorStop(0, 'rgba(255, 0, 50, 0)');
            grad.addColorStop(0.4, 'rgba(255, 0, 50, 0.08)');
            grad.addColorStop(0.7, 'rgba(255, 0, 50, 0.2)');
            grad.addColorStop(1, 'rgba(255, 0, 50, 0.5)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, height - 70, width, 70);

            // Upward-pointing triangles along the bottom
            const triSize = 12;
            const triSpacing = 28;
            const pulse = 0.6 + Math.sin(Date.now() / 400) * 0.3;
            ctx.fillStyle = 'rgba(255, 0, 60, ' + (0.35 * pulse) + ')';
            for (let x = 0; x < width + triSpacing; x += triSpacing) {
                ctx.beginPath();
                ctx.moveTo(x - triSize / 2, height);
                ctx.lineTo(x, height - triSize);
                ctx.lineTo(x + triSize / 2, height);
                ctx.closePath();
                ctx.fill();
            }

            // Subtle red line at the death boundary
            ctx.strokeStyle = 'rgba(255, 0, 60, ' + (0.4 * pulse) + ')';
            ctx.lineWidth = 1;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(0, height - 2);
            ctx.lineTo(width, height - 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawTrail() {
            if (trail.length < 2) return;
            ctx.lineCap = 'round';
            for (let i = 1; i < trail.length; i++) {
                const t1 = trail[i - 1], t2 = trail[i];
                const alpha = (i / trail.length) * 0.5;
                const lineWidth = (i / trail.length) * ball.radius * 1.5;
                ctx.beginPath();
                ctx.moveTo(t1.x, t1.y);
                ctx.lineTo(t2.x, t2.y);
                ctx.strokeStyle = 'rgba(0, 242, 255, ' + alpha + ')';
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        function drawPlatforms() {
            for (let p of platforms) {
                const x = p.x - worldOffset;
                if (x + p.w < 0 || x > width) continue;
                const grad = ctx.createLinearGradient(x, p.y, x, p.y + p.h);
                grad.addColorStop(0, '#2c3e50');
                grad.addColorStop(1, '#0f172a');
                ctx.fillStyle = grad;
                ctx.fillRect(x, p.y, p.w, p.h);

                const glowColor = ball.gravityDir === 1 ? '#00f2ff' : '#ff00de';
                ctx.fillStyle = glowColor;
                ctx.fillRect(x, p.y, p.w, 2);
                ctx.fillRect(x, p.y + p.h - 2, p.w, 2);
                ctx.save();
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 10;
                ctx.fillRect(x, p.y, p.w, 2);
                ctx.fillRect(x, p.y + p.h - 2, p.w, 2);
                ctx.restore();
            }
        }

        function drawObstacles() {
            for (let o of obstacles) {
                const x = o.x - worldOffset;
                if (x + o.w < 0 || x > width) continue;
                const cx = x + o.w / 2;
                let topY, bottomY;

                ctx.save();
                ctx.shadowColor = '#ff0055';
                ctx.shadowBlur = 12;

                if (o.pointing === 'down') {
                    topY = o.y; bottomY = o.y + o.h;
                    ctx.beginPath();
                    ctx.moveTo(x, topY);
                    ctx.lineTo(cx, bottomY);
                    ctx.lineTo(x + o.w, topY);
                    ctx.closePath();
                } else {
                    topY = o.y; bottomY = o.y + o.h;
                    ctx.beginPath();
                    ctx.moveTo(x, bottomY);
                    ctx.lineTo(cx, topY);
                    ctx.lineTo(x + o.w, bottomY);
                    ctx.closePath();
                }

                const grad = ctx.createLinearGradient(x, topY, cx, bottomY);
                grad.addColorStop(0, '#4a0000');
                grad.addColorStop(1, '#ff0055');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            }
        }

        function drawCheckpoints() {
            if (currentLevel < 0) return;
            const cps = checkpointPositions[currentLevel];
            for (let cp of cps) {
                const sx = cp - worldOffset;
                if (sx < -30 || sx > width + 30) continue;
                const isActivated = checkpointX >= cp;

                ctx.save();
                ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 300) * 0.3;
                ctx.shadowColor = isActivated ? '#00ff88' : '#888888';
                ctx.shadowBlur = isActivated ? 15 : 5;

                ctx.fillStyle = isActivated ? '#00ff88' : '#555555';
                ctx.fillRect(sx - 2, 50, 4, height - 50);

                ctx.beginPath();
                ctx.moveTo(sx, 45);
                ctx.lineTo(sx + 10, 55);
                ctx.lineTo(sx, 65);
                ctx.lineTo(sx - 10, 55);
                ctx.closePath();
                ctx.fillStyle = isActivated ? '#00ff88' : '#666666';
                ctx.fill();

                ctx.restore();
            }
        }

        function drawFinishFlag() {
            const flagX = finishX - worldOffset;
            if (flagX < -50 || flagX > width + 50) return;
            ctx.save();
            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(flagX, 100, 4, 100);
            ctx.beginPath();
            ctx.moveTo(flagX + 4, 100);
            ctx.lineTo(flagX + 40, 120);
            ctx.lineTo(flagX + 4, 140);
            ctx.closePath();
            const grad = ctx.createLinearGradient(flagX, 100, flagX + 40, 140);
            grad.addColorStop(0, '#00ff00');
            grad.addColorStop(1, '#008800');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        }

        function drawParticles() {
            for (const p of deathParticles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,' + Math.floor(100 + Math.random() * 100) + ',0,' + p.alpha + ')';
                ctx.fill();
            }
            for (const p of flipParticles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 242, 255, ' + p.alpha + ')';
                ctx.fill();
            }
        }

        // ---------- Ball Skins ----------
        function drawBall() {
            ctx.save();
            if (invincibleTimer > 0 && Math.floor(invincibleTimer / 4) % 2 === 0) {
                ctx.globalAlpha = 0.4;
            }
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.translate(ball.x - worldOffset, ball.y);
            ctx.rotate(ball.angle);

            switch (skinIndex) {
                case 0: drawDefaultBall(); break;
                case 1: drawGlassBall(); break;
                case 2: drawStarBall(); break;
                case 3: drawSoccerBall(); break;
            }
            ctx.restore();
        }

        function drawDefaultBall() {
            const r = ball.radius;
            const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
            grad.addColorStop(0, '#ffbb00');
            grad.addColorStop(1, '#e67e00');
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = grad; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(r * 0.8, 0);
            ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 3; ctx.stroke();
        }

        function drawGlassBall() {
            const r = ball.radius;
            const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
            g.addColorStop(0, 'rgba(255,255,255,0.9)');
            g.addColorStop(0.5, 'rgba(0,242,255,0.6)');
            g.addColorStop(1, 'rgba(0,100,200,0.8)');
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = g; ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2; ctx.stroke();
            ctx.beginPath();
            ctx.arc(-r * 0.25, -r * 0.25, r * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'white'; ctx.fill();
        }

        function drawStarBall() {
            const r = ball.radius;
            const spikes = 5, outerR = r, innerR = r * 0.45;
            let rot = Math.PI / 2 * 3;
            const step = Math.PI / spikes;
            ctx.beginPath();
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(Math.cos(rot) * outerR, Math.sin(rot) * outerR); rot += step;
                ctx.lineTo(Math.cos(rot) * innerR, Math.sin(rot) * innerR); rot += step;
            }
            ctx.closePath();
            const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, r);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(1, '#f1c40f');
            ctx.fillStyle = grad; ctx.fill();
            ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2; ctx.stroke();
        }

        function drawSoccerBall() {
            const r = ball.radius;
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff'; ctx.fill();
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.stroke();
            const pentPoints = [];
            for (let i = 0; i < 5; i++) {
                const a = (i * 2 * Math.PI / 5) - Math.PI / 2;
                pentPoints.push({ x: r * 0.4 * Math.cos(a), y: r * 0.4 * Math.sin(a) });
            }
            ctx.beginPath();
            ctx.moveTo(pentPoints[0].x, pentPoints[0].y);
            for (let i = 1; i < 5; i++) ctx.lineTo(pentPoints[i].x, pentPoints[i].y);
            ctx.closePath();
            ctx.fillStyle = '#000000'; ctx.fill();
            pentPoints.forEach(function(p) {
                const a = Math.atan2(p.y, p.x);
                ctx.beginPath(); ctx.moveTo(p.x, p.y);
                ctx.lineTo(r * Math.cos(a), r * Math.sin(a));
                ctx.strokeStyle = '#000000'; ctx.lineWidth = 2; ctx.stroke();
            });
        }

        // ---------- Text & UI ----------
        function setFont(size, weight) {
            ctx.font = (weight || '700') + ' ' + size + 'px Orbitron, sans-serif';
        }

        function drawUI() {
            if (gameState === 'playing' || gameState === 'paused') {
                setFont(14);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'left';
                ctx.fillText('DEATHS: ' + deathCount, 20, 40);

                if (checkpointX > 120) {
                    setFont(11, '400');
                    ctx.fillStyle = '#00ff88';
                    ctx.fillText('CHECKPOINT SAVED', 20, 58);
                }

                // Progress bar
                const progress = Math.min(1, Math.max(0, (ball.x - 120) / (finishX - 120)));
                const barW = 300, barH = 18;
                const barX = (width - barW) / 2, barY = 15;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(barX, barY, barW, barH);
                const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                grad.addColorStop(0, '#00f2ff');
                grad.addColorStop(1, '#ff00de');
                ctx.fillStyle = grad;
                ctx.fillRect(barX, barY, barW * progress, barH);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(barX, barY, barW, barH);
                setFont(12, '700');
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(Math.floor(progress * 100) + '%', width / 2, barY + barH / 2);
                ctx.textBaseline = 'alphabetic';

                if (gameState === 'playing') {
                    // Cooldown ring
                    const cooldownRatio = ball.flipCooldown / FLIP_COOLDOWN;
                    if (cooldownRatio > 0) {
                        const bx = ball.x - worldOffset, by = ball.y;
                        ctx.beginPath();
                        ctx.arc(bx, by, ball.radius + 6, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (1 - cooldownRatio));
                        ctx.strokeStyle = 'rgba(0, 242, 255, 0.5)';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }

                    setFont(13);
                    const statusText = ball.flipCooldown <= 0 ? 'FLIP READY' : 'COOLDOWN';
                    ctx.fillStyle = ball.flipCooldown <= 0 ? '#00ff00' : '#ff8800';
                    ctx.textAlign = 'center';
                    ctx.fillText(statusText, width / 2, height - 35);
                }

                // Pause button
                const pauseX = width - 105, pauseY = 10, pauseW = 100, pauseH = 45;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(pauseX, pauseY, pauseW, pauseH);
                ctx.strokeStyle = ball.gravityDir === 1 ? '#00f2ff' : '#ff00de';
                ctx.lineWidth = 2;
                ctx.strokeRect(pauseX, pauseY, pauseW, pauseH);
                setFont(16); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText('PAUSE', pauseX + pauseW / 2, pauseY + 29);
            }

            if (gameState === 'paused') {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, width, height);
                ctx.save();
                ctx.shadowColor = '#00f2ff';
                ctx.shadowBlur = 20;
                setFont(40, '900');
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', width / 2, height / 2 - 20);
                ctx.restore();

                const btnW = 180, btnH = 50, gap = 20;
                const totalW = btnW * 2 + gap;
                const startX = (width - totalW) / 2;
                const btnY = height / 2 + 20;

                ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
                ctx.fillRect(startX, btnY, btnW, btnH);
                ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2;
                ctx.strokeRect(startX, btnY, btnW, btnH);
                setFont(18, '700'); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText('RESUME', startX + btnW / 2, btnY + 32);

                ctx.fillStyle = 'rgba(255, 0, 128, 0.2)';
                ctx.fillRect(startX + btnW + gap, btnY, btnW, btnH);
                ctx.strokeStyle = '#ff0080'; ctx.lineWidth = 2;
                ctx.strokeRect(startX + btnW + gap, btnY, btnW, btnH);
                ctx.fillStyle = '#fff';
                ctx.fillText('QUIT', startX + btnW + gap + btnW / 2, btnY + 32);
            }

            if (gameState === 'levelComplete') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, width, height);

                ctx.save();
                ctx.shadowColor = '#00ff00';
                ctx.shadowBlur = 30;
                setFont(42, '900');
                ctx.fillStyle = '#00ff00';
                ctx.textAlign = 'center';
                ctx.fillText('LEVEL COMPLETE', width / 2, height / 2 - 40);
                ctx.restore();

                setFont(20);
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.fillText('Deaths: ' + deathCount, width / 2, height / 2 + 10);

                const unlockMsg = ['Glass skin unlocked!', 'Star skin unlocked!', 'Soccer skin unlocked!'];
                if (currentLevel >= 0 && currentLevel <= 2) {
                    setFont(16, '400');
                    ctx.fillStyle = '#f1c40f';
                    ctx.fillText(unlockMsg[currentLevel], width / 2, height / 2 + 45);
                }

                setFont(14, '400');
                ctx.fillStyle = '#aaaaaa';
                ctx.fillText('Click anywhere to return to menu', width / 2, height / 2 + 85);
            }
        }

        function drawMenu() {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#05050a');
            grad.addColorStop(1, '#1a0a2e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);
            drawBgStars();

            ctx.save();
            ctx.shadowColor = '#00f2ff';
            ctx.shadowBlur = 20;
            setFont(36, '900');
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText('CALL OF THE BALL', width / 2, 80);
            ctx.shadowBlur = 0;
            setFont(14, '400');
            ctx.fillStyle = '#00f2ff';
            ctx.fillText('NEON EDITION', width / 2, 105);
            ctx.restore();

            const levelNames = ['EASY', 'MEDIUM', 'HARD'];
            const colors = ['#00ff00', '#ffff00', '#ff0055'];
            const btnW = 150, btnH = 50, gap = 50;
            const totalWidth = 3 * btnW + 2 * gap;
            const startX = (width - totalWidth) / 2;
            for (let i = 0; i < 3; i++) {
                const bx = startX + i * (btnW + gap), by = 140;
                ctx.save();
                ctx.shadowColor = colors[i];
                ctx.shadowBlur = 10;
                const gradBtn = ctx.createLinearGradient(bx, by, bx, by + btnH);
                gradBtn.addColorStop(0, colors[i]);
                gradBtn.addColorStop(1, 'rgba(0,0,0,0.8)');
                ctx.fillStyle = gradBtn;
                ctx.fillRect(bx, by, btnW, btnH);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
                ctx.strokeRect(bx, by, btnW, btnH);
                ctx.restore();
                setFont(16); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(levelNames[i], bx + btnW / 2, by + 33);
            }

            const skinNames = ['DEFAULT', 'GLASS', 'STAR', 'SOCCER'];
            for (let i = 0; i < 4; i++) {
                const sx = 90 + i * 155, sy = 250, sw = 130, sh = 55;
                ctx.fillStyle = unlockedSkins[i] ? (i === skinIndex ? '#00f2ff' : '#7f8c8d') : '#2c3e50';
                ctx.fillRect(sx, sy, sw, sh);
                ctx.strokeStyle = unlockedSkins[i] ? '#fff' : '#555';
                ctx.lineWidth = 2; ctx.strokeRect(sx, sy, sw, sh);
                setFont(10); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                if (unlockedSkins[i]) {
                    ctx.fillText(skinNames[i], sx + sw / 2, sy + 25);
                    if (i === skinIndex) {
                        setFont(8); ctx.fillText('(EQUIPPED)', sx + sw / 2, sy + 45);
                    }
                } else {
                    ctx.fillText('LOCKED', sx + sw / 2, sy + 25);
                    setFont(7); ctx.fillText(skinNames[i], sx + sw / 2, sy + 42);
                }
            }

            setFont(12); ctx.fillStyle = '#bbb'; ctx.textAlign = 'center';
            ctx.fillText('Beat Easy to unlock Glass', width / 2, 355);
            ctx.fillText('Beat Medium to unlock Star', width / 2, 378);
            ctx.fillText('Beat Hard to unlock Soccer', width / 2, 401);

            // Warning about ground death
            ctx.save();
            ctx.shadowColor = '#ff0033';
            ctx.shadowBlur = 8;
            setFont(12, '700');
            ctx.fillStyle = '#ff0055';
            ctx.fillText('WARNING: Falling to the ground = DEATH', width / 2, 430);
            ctx.restore();

            setFont(11, '400'); ctx.fillStyle = '#777';
            ctx.fillText('Click / Space = Flip Gravity  |  Arrows = Move  |  P = Pause', width / 2, 455);
            setFont(10, '400'); ctx.fillStyle = '#555';
            ctx.fillText('Avoid red spikes on platforms AND ceiling. Thread the gaps. Use checkpoints.', width / 2, 478);
        }

        // ---------- Main Loop ----------
        function gameLoop() {
            update();
            ctx.clearRect(0, 0, width, height);

            if (gameState === 'menu') {
                drawMenu();
            } else {
                drawBackground();
                drawGrid();
                drawBgStars();
                drawSparkles();
                drawDeathZone();
                drawCheckpoints();
                drawPlatforms();
                drawObstacles();
                drawFinishFlag();
                drawTrail();
                drawParticles();
                drawBall();
                drawUI();
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    })();
    </script>
</body>

        // ---------- Input ----------
        const keys = {};
        window.addEventListener('keydown', function(e) {
            keys[e.code] = true;
