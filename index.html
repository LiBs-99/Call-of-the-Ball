<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of the Ball</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 2px solid #ffffff33;
            display: block;
            touch-action: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width, height = canvas.height;

            // ---------- Game State ----------
            let gameState = 'menu';       // 'menu', 'playing', 'paused', 'levelComplete', 'timeUp'
            let currentLevel = -1;
            let skinIndex = 0;
            let deathCount = 0;
            let levelTimeLeft = 60;
            let unlockedSkins = [true, false, false, false];

            // ---------- Ball ----------
            const ball = {
                x: 120, y: height/2, radius: 20,
                vx: 0, vy: 0, gravityDir: 1,
                grounded: false, angle: 0, canFlip: true
            };
            const gravityStrength = 0.6, maxFallSpeed = 12;

            // ---------- World ----------
            let worldOffset = 0, levelLength = 4000, finishX = 3800;
            let platforms = [], obstacles = [];

            // ---------- Background stars ----------
            let bgStars = [];
            function generateBgStars(count = 60) {
                bgStars = [];
                for (let i = 0; i < count; i++) {
                    bgStars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        radius: Math.random() * 1.8 + 0.3,
                        speedX: (Math.random() - 0.5) * 0.2,
                        speedY: (Math.random() - 0.5) * 0.2,
                        alpha: Math.random() * 0.5 + 0.3
                    });
                }
            }
            generateBgStars();

            // ---------- Level Data ----------
            const levelData = [
                // Easy
                [
                    { type:'platform', x:0, y:400, w:180, h:15 },
                    { type:'platform', x:250, y:320, w:150, h:15 },
                    { type:'platform', x:450, y:240, w:150, h:15 },
                    { type:'platform', x:700, y:340, w:180, h:15 },
                    { type:'platform', x:950, y:260, w:130, h:15 },
                    { type:'platform', x:1150, y:180, w:150, h:15 },
                    { type:'platform', x:1400, y:300, w:200, h:15 },
                    { type:'platform', x:1650, y:220, w:150, h:15 },
                    { type:'platform', x:1850, y:380, w:200, h:15 },
                    { type:'platform', x:2100, y:280, w:150, h:15 },
                    { type:'platform', x:2350, y:180, w:180, h:15 },
                    { type:'platform', x:2600, y:320, w:200, h:15 },
                    { type:'platform', x:2900, y:240, w:200, h:15 },
                    { type:'platform', x:3200, y:350, w:200, h:15 },
                    { type:'obstacle', x:200, y:350, w:25, h:50 },
                    { type:'obstacle', x:350, y:270, w:25, h:50 },
                    { type:'obstacle', x:550, y:190, w:25, h:50 },
                    { type:'obstacle', x:800, y:290, w:25, h:50 },
                    { type:'obstacle', x:1050, y:210, w:25, h:50 },
                    { type:'obstacle', x:1300, y:130, w:25, h:50 },
                    { type:'obstacle', x:1500, y:250, w:25, h:50 },
                    { type:'obstacle', x:1750, y:170, w:25, h:50 },
                    { type:'obstacle', x:1950, y:330, w:25, h:50 },
                    { type:'obstacle', x:2200, y:230, w:25, h:50 },
                    { type:'obstacle', x:100, y:0, w:30, h:40 },
                    { type:'obstacle', x:600, y:0, w:30, h:40 },
                    { type:'obstacle', x:1200, y:0, w:30, h:40 },
                    { type:'obstacle', x:1800, y:0, w:30, h:40 },
                    { type:'obstacle', x:2400, y:0, w:30, h:40 },
                    { type:'obstacle', x:3000, y:0, w:30, h:40 },
                ],
                // Medium
                [
                    { type:'platform', x:0, y:380, w:160, h:15 },
                    { type:'platform', x:220, y:300, w:140, h:15 },
                    { type:'platform', x:400, y:220, w:140, h:15 },
                    { type:'platform', x:600, y:340, w:160, h:15 },
                    { type:'platform', x:820, y:260, w:120, h:15 },
                    { type:'platform', x:1000, y:180, w:130, h:15 },
                    { type:'platform', x:1200, y:300, w:180, h:15 },
                    { type:'platform', x:1400, y:220, w:120, h:15 },
                    { type:'platform', x:1600, y:380, w:180, h:15 },
                    { type:'platform', x:1850, y:280, w:150, h:15 },
                    { type:'platform', x:2050, y:180, w:150, h:15 },
                    { type:'platform', x:2300, y:300, w:200, h:15 },
                    { type:'platform', x:2550, y:220, w:150, h:15 },
                    { type:'platform', x:2800, y:350, w:200, h:15 },
                    { type:'platform', x:3100, y:260, w:180, h:15 },
                    { type:'obstacle', x:150, y:330, w:25, h:50 },
                    { type:'obstacle', x:320, y:250, w:25, h:50 },
                    { type:'obstacle', x:500, y:170, w:25, h:50 },
                    { type:'obstacle', x:700, y:290, w:25, h:50 },
                    { type:'obstacle', x:900, y:210, w:25, h:50 },
                    { type:'obstacle', x:1100, y:130, w:25, h:50 },
                    { type:'obstacle', x:1300, y:250, w:25, h:50 },
                    { type:'obstacle', x:1500, y:170, w:25, h:50 },
                    { type:'obstacle', x:1700, y:330, w:25, h:50 },
                    { type:'obstacle', x:1950, y:230, w:25, h:50 },
                    { type:'obstacle', x:2150, y:130, w:25, h:50 },
                    { type:'obstacle', x:2400, y:250, w:25, h:50 },
                    { type:'obstacle', x:2650, y:170, w:25, h:50 },
                    { type:'obstacle', x:2900, y:300, w:25, h:50 },
                    { type:'obstacle', x:50, y:0, w:25, h:35 },
                    { type:'obstacle', x:450, y:0, w:25, h:35 },
                    { type:'obstacle', x:900, y:0, w:25, h:35 },
                    { type:'obstacle', x:1400, y:0, w:25, h:35 },
                    { type:'obstacle', x:1900, y:0, w:25, h:35 },
                    { type:'obstacle', x:2500, y:0, w:25, h:35 },
                    { type:'obstacle', x:3000, y:0, w:25, h:35 },
                ],
                // Hard
                [
                    { type:'platform', x:0, y:390, w:130, h:15 },
                    { type:'platform', x:180, y:310, w:100, h:15 },
                    { type:'platform', x:340, y:230, w:100, h:15 },
                    { type:'platform', x:500, y:350, w:120, h:15 },
                    { type:'platform', x:680, y:260, w:100, h:15 },
                    { type:'platform', x:830, y:180, w:100, h:15 },
                    { type:'platform', x:980, y:300, w:140, h:15 },
                    { type:'platform', x:1160, y:220, w:100, h:15 },
                    { type:'platform', x:1300, y:380, w:140, h:15 },
                    { type:'platform', x:1500, y:280, w:120, h:15 },
                    { type:'platform', x:1680, y:190, w:100, h:15 },
                    { type:'platform', x:1830, y:330, w:150, h:15 },
                    { type:'platform', x:2050, y:240, w:120, h:15 },
                    { type:'platform', x:2220, y:150, w:100, h:15 },
                    { type:'platform', x:2400, y:300, w:160, h:15 },
                    { type:'platform', x:2620, y:220, w:120, h:15 },
                    { type:'platform', x:2800, y:350, w:150, h:15 },
                    { type:'platform', x:3050, y:260, w:140, h:15 },
                    { type:'obstacle', x:120, y:340, w:22, h:50 },
                    { type:'obstacle', x:250, y:260, w:22, h:50 },
                    { type:'obstacle', x:400, y:180, w:22, h:50 },
                    { type:'obstacle', x:560, y:300, w:22, h:50 },
                    { type:'obstacle', x:720, y:210, w:22, h:50 },
                    { type:'obstacle', x:880, y:130, w:22, h:50 },
                    { type:'obstacle', x:1040, y:250, w:22, h:50 },
                    { type:'obstacle', x:1200, y:170, w:22, h:50 },
                    { type:'obstacle', x:1370, y:330, w:22, h:50 },
                    { type:'obstacle', x:1540, y:230, w:22, h:50 },
                    { type:'obstacle', x:1720, y:140, w:22, h:50 },
                    { type:'obstacle', x:1900, y:280, w:22, h:50 },
                    { type:'obstacle', x:2100, y:190, w:22, h:50 },
                    { type:'obstacle', x:2270, y:100, w:22, h:50 },
                    { type:'obstacle', x:2450, y:250, w:22, h:50 },
                    { type:'obstacle', x:2680, y:170, w:22, h:50 },
                    { type:'obstacle', x:2850, y:300, w:22, h:50 },
                    { type:'obstacle', x:3100, y:210, w:22, h:50 },
                    { type:'obstacle', x:80, y:0, w:20, h:35 },
                    { type:'obstacle', x:300, y:0, w:20, h:35 },
                    { type:'obstacle', x:550, y:0, w:20, h:35 },
                    { type:'obstacle', x:800, y:0, w:20, h:35 },
                    { type:'obstacle', x:1100, y:0, w:20, h:35 },
                    { type:'obstacle', x:1350, y:0, w:20, h:35 },
                    { type:'obstacle', x:1600, y:0, w:20, h:35 },
                    { type:'obstacle', x:1850, y:0, w:20, h:35 },
                    { type:'obstacle', x:2100, y:0, w:20, h:35 },
                    { type:'obstacle', x:2400, y:0, w:20, h:35 },
                    { type:'obstacle', x:2700, y:0, w:20, h:35 },
                    { type:'obstacle', x:3000, y:0, w:20, h:35 },
                ]
            ];

            // ---------- Input ----------
            const keys = {};
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if (e.code === 'Space') { e.preventDefault(); attemptFlip(); }
                if (e.code === 'KeyP') { togglePause(); }
            });
            window.addEventListener('keyup', e => keys[e.code] = false);

            canvas.addEventListener('pointerdown', e => {
                e.preventDefault();
                const mx = e.offsetX, my = e.offsetY;
                if (gameState === 'menu') handleMenuClick(mx, my);
                else if (gameState === 'playing') {
                    // Enlarged pause button hit area
                    if (mx >= width - 65 && mx <= width - 5 && my >= 5 && my <= 50) togglePause();
                    else attemptFlip();
                }
                else if (gameState === 'paused') togglePause();
            });

            function togglePause() {
                if (gameState === 'playing') gameState = 'paused';
                else if (gameState === 'paused') gameState = 'playing';
            }

            function attemptFlip() {
                if (gameState !== 'playing') return;
                if (!ball.canFlip) return;
                ball.gravityDir *= -1;
                ball.vy = ball.gravityDir * 4;
                ball.canFlip = false;
            }

            function loadLevel(levelIndex) {
                currentLevel = levelIndex;
                const data = levelData[levelIndex];
                platforms = data.filter(o => o.type === 'platform').map(o => ({...o}));
                obstacles = data.filter(o => o.type === 'obstacle').map(o => ({...o}));
                ball.vx = [2, 3.5, 5][levelIndex];
                levelLength = 3500;
                finishX = levelLength - 200;
                ball.x = 120; ball.y = height/2; ball.vy = 0; ball.gravityDir = 1;
                ball.grounded = false; ball.canFlip = true; ball.angle = 0;
                worldOffset = 0; deathCount = 0; levelTimeLeft = 60;
                gameState = 'playing';
            }

            // ---------- Collision ----------
            function checkCollisions() {
                ball.grounded = false;
                for (let p of platforms) {
                    const platLeft = p.x - worldOffset;
                    const platRight = platLeft + p.w;
                    const platTop = p.y;
                    const platBottom = p.y + p.h;
                    const closestX = Math.max(platLeft, Math.min(ball.x, platRight));
                    const closestY = Math.max(platTop, Math.min(ball.y, platBottom));
                    const dx = ball.x - closestX;
                    const dy = ball.y - closestY;
                    const distSq = dx*dx + dy*dy;
                    if (distSq < ball.radius * ball.radius) {
                        const dist = Math.sqrt(distSq);
                        const overlap = ball.radius - dist;
                        if (dist > 0) { ball.x += (dx / dist) * overlap; ball.y += (dy / dist) * overlap; }
                        if (ball.gravityDir === 1) {
                            if (ball.vy >= 0 && ball.y - ball.radius <= platTop + 2) {
                                ball.y = platTop - ball.radius;
                                ball.vy = 0;
                                ball.grounded = true;
                            }
                        } else {
                            if (ball.vy <= 0 && ball.y + ball.radius >= platBottom - 2) {
                                ball.y = platBottom + ball.radius;
                                ball.vy = 0;
                                ball.grounded = true;
                            }
                        }
                    }
                }
                if (ball.y - ball.radius <= 0) {
                    ball.y = ball.radius;
                    if (ball.gravityDir === -1 && ball.vy <= 0) {
                        ball.vy = 0;
                        ball.grounded = true;
                    }
                }
                if (ball.grounded) ball.canFlip = true;
                for (let o of obstacles) {
                    const ol = o.x - worldOffset, orr = ol + o.w, ot = o.y, ob = o.y + o.h;
                    const cx = Math.max(ol, Math.min(ball.x, orr));
                    const cy = Math.max(ot, Math.min(ball.y, ob));
                    if ((ball.x-cx)**2 + (ball.y-cy)**2 < ball.radius**2) { deathCount++; resetBall(); return; }
                }
                if (ball.y + ball.radius > height) { deathCount++; resetBall(); }
            }

            function resetBall() {
                ball.x = 120; ball.y = height/2; ball.vy = 0; ball.gravityDir = 1;
                ball.grounded = false; ball.canFlip = true; ball.angle = 0; worldOffset = 0;
            }

            function update(deltaTime) {
                if (gameState !== 'playing') return;
                levelTimeLeft -= deltaTime;
                if (levelTimeLeft <= 0) { gameState = 'timeUp'; return; }
                if (keys['ArrowLeft'] || keys['KeyA']) ball.x -= 2.5;
                if (keys['ArrowRight'] || keys['KeyD']) ball.x += 2.5;
                ball.x += ball.vx;
                if (ball.x < 0) ball.x = 0;
                // Centred camera: keep ball at centre (x=400) once past halfway
                worldOffset = Math.max(0, ball.x - width/2);
                ball.vy += gravityStrength * ball.gravityDir;
                if (Math.abs(ball.vy) > maxFallSpeed) ball.vy = Math.sign(ball.vy) * maxFallSpeed;
                ball.y += ball.vy;
                ball.angle += ball.vx / ball.radius * ball.gravityDir;
                checkCollisions();
                if (ball.x >= finishX) {
                    gameState = 'levelComplete';
                    if (currentLevel === 0) unlockedSkins[1] = true;
                    if (currentLevel === 1) unlockedSkins[2] = true;
                    if (currentLevel === 2) unlockedSkins[3] = true;
                }
            }

            // ---------- Drawing ----------
            function drawGradientBackground() {
                const topColor = ball.gravityDir === 1 ? '#0a0a2e' : '#2e0a2e';
                const bottomColor = ball.gravityDir === 1 ? '#1a1a4e' : '#4e1a4e';
                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, topColor);
                gradient.addColorStop(1, bottomColor);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
            }

            function drawBgStars() {
                for (let s of bgStars) {
                    s.x += s.speedX;
                    s.y += s.speedY;
                    if (s.x < 0) s.x = width;
                    if (s.x > width) s.x = 0;
                    if (s.y < 0) s.y = height;
                    if (s.y > height) s.y = 0;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
                    ctx.fill();
                }
            }

            function drawPlatforms() {
                ctx.fillStyle = '#3498db';
                for (let p of platforms) {
                    const x = p.x - worldOffset;
                    if (x + p.w < 0 || x > width) continue;
                    ctx.fillRect(x, p.y, p.w, p.h);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(x, p.y, p.w, p.h);
                }
            }

            function drawObstacles() {
                ctx.save();
                ctx.shadowColor = '#ff5500';
                ctx.shadowBlur = 12;
                for (let o of obstacles) {
                    const x = o.x - worldOffset;
                    if (x + o.w < 0 || x > width) continue;
                    const cx = x + o.w/2;
                    const topY = o.y, bottomY = o.y + o.h;
                    ctx.beginPath();
                    if (o.y === 0) { ctx.moveTo(x, topY); ctx.lineTo(cx, bottomY); ctx.lineTo(x + o.w, topY); }
                    else { ctx.moveTo(x, bottomY); ctx.lineTo(cx, topY); ctx.lineTo(x + o.w, bottomY); }
                    ctx.closePath();
                    const gradient = ctx.createLinearGradient(x, topY, x, bottomY);
                    gradient.addColorStop(0, '#ff4400'); gradient.addColorStop(1, '#aa0000');
                    ctx.fillStyle = gradient; ctx.fill();
                    ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.restore();
            }

            function drawFinishFlag() {
                const flagX = finishX - worldOffset;
                if (flagX < -50 || flagX > width+50) return;
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(flagX, 100, 10, 80);
                ctx.beginPath(); ctx.moveTo(flagX, 100); ctx.lineTo(flagX+30, 120); ctx.lineTo(flagX, 140);
                ctx.fillStyle = '#2ecc71'; ctx.fill();
            }

            // Ball skins
            function drawBall() {
                ctx.save(); ctx.translate(ball.x - worldOffset, ball.y); ctx.rotate(ball.angle);
                // When using camera offset, we must draw ball at its screen position: (ball.x - worldOffset, ball.y)
                // Since we set translate to that, it's correct.
                switch(skinIndex) {
                    case 0: drawDefaultBall(); break;
                    case 1: drawGlassBall(); break;
                    case 2: drawStarBall(); break;
                    case 3: drawSoccerBall(); break;
                }
                ctx.restore();
            }
            function drawDefaultBall() {
                let r = ball.radius;
                ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='#f39c12'; ctx.fill();
                ctx.lineWidth=3; ctx.strokeStyle='#2c3e50'; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(r*0.8,0); ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();
            }
            function drawGlassBall() {
                let r = ball.radius;
                let g = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
                g.addColorStop(0,'rgba(255,255,255,0.9)'); g.addColorStop(0.5,'rgba(100,200,255,0.6)'); g.addColorStop(1,'rgba(0,100,200,0.8)');
                ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.stroke();
                ctx.beginPath(); ctx.arc(-r*0.25,-r*0.25,r*0.2,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
            }
            function drawStarBall() {
                let r=ball.radius, spikes=5, outerR=r, innerR=r*0.45, rot=Math.PI/2*3, step=Math.PI/spikes;
                ctx.beginPath();
                for(let i=0;i<spikes;i++){ ctx.lineTo(Math.cos(rot)*outerR, Math.sin(rot)*outerR); rot+=step; ctx.lineTo(Math.cos(rot)*innerR, Math.sin(rot)*innerR); rot+=step; }
                ctx.closePath(); ctx.fillStyle='#f1c40f'; ctx.fill(); ctx.strokeStyle='#2c3e50'; ctx.lineWidth=2; ctx.stroke();
            }
            function drawSoccerBall() {
                let r=ball.radius;
                ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill(); ctx.strokeStyle='black'; ctx.lineWidth=2; ctx.stroke();
                let pentPoints=[];
                for(let i=0;i<5;i++){ let a=(i*2*Math.PI/5)-Math.PI/2; pentPoints.push({x:r*0.4*Math.cos(a), y:r*0.4*Math.sin(a)}); }
                ctx.beginPath(); ctx.moveTo(pentPoints[0].x,pentPoints[0].y); for(let i=1;i<5;i++) ctx.lineTo(pentPoints[i].x,pentPoints[i].y); ctx.closePath(); ctx.fillStyle='black'; ctx.fill();
                pentPoints.forEach(p=>{ let a=Math.atan2(p.y,p.x); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(r*Math.cos(a),r*Math.sin(a)); ctx.strokeStyle='black'; ctx.lineWidth=2; ctx.stroke(); });
            }

            // UI
            function setFont(size) {
                ctx.font = `${size}px "Press Start 2P", sans-serif`;
            }
            function drawUI() {
                if (gameState === 'playing' || gameState === 'paused') {
                    setFont(14); ctx.fillStyle = '#fff'; ctx.textAlign = 'right';
                    ctx.fillText(`TIME: ${Math.ceil(levelTimeLeft)}s`, width-20, 40);
                    ctx.textAlign = 'left'; ctx.fillText(`DEATHS: ${deathCount}`, 20, 40);

                    if (gameState === 'playing') {
                        setFont(16);
                        let statusText = ball.canFlip ? 'FLIP READY' : 'IN AIR';
                        ctx.fillStyle = ball.canFlip ? '#2ecc71' : '#e74c3c';
                        ctx.textAlign = 'center';
                        ctx.fillText(statusText, width/2, height-20);
                    }

                    // Pause button – larger and easier to hit
                    const pauseX = width - 55;
                    const pauseY = 10;
                    const pauseW = 45;
                    const pauseH = 35;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(pauseX, pauseY, pauseW, pauseH);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(pauseX, pauseY, pauseW, pauseH);
                    setFont(16);
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.fillText('⏸', pauseX + pauseW/2, pauseY + 25);
                }

                if (gameState === 'paused') {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0,0,width,height);
                    setFont(30); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                    ctx.fillText('PAUSED', width/2, height/2-20);
                    setFont(14); ctx.fillText('Tap or press P', width/2, height/2+40);
                }
            }

            // Menu – centred difficulty buttons
            function drawMenu() {
                ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,width,height);
                for (let s of bgStars) {
                    s.x += s.speedX * 2; s.y += s.speedY * 2;
                    if (s.x < 0) s.x = width; if (s.x > width) s.x = 0;
                    if (s.y < 0) s.y = height; if (s.y > height) s.y = 0;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${s.alpha + 0.2})`;
                    ctx.fill();
                }

                ctx.save();
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 20;
                setFont(36);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText('CALL OF THE BALL', width/2, 80);
                ctx.restore();

                const levelNames = ['EASY', 'MEDIUM', 'HARD'];
                const colors = ['#27ae60', '#f1c40f', '#e74c3c'];
                const btnW = 150, btnH = 50, gap = 50;
                const totalWidth = 3 * btnW + 2 * gap;
                const startX = (width - totalWidth) / 2;
                for (let i = 0; i < 3; i++) {
                    let bx = startX + i * (btnW + gap);
                    let by = 140;
                    let grad = ctx.createLinearGradient(bx, by, bx, by+btnH);
                    grad.addColorStop(0, colors[i]); grad.addColorStop(1, '#00000088');
                    ctx.fillStyle = grad; ctx.fillRect(bx, by, btnW, btnH);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, btnW, btnH);
                    setFont(18); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                    ctx.fillText(levelNames[i], bx + btnW/2, by + 33);
                }

                const skinNames = ['DEFAULT', 'GLASS', 'STAR', 'SOCCER'];
                // Skin buttons kept as before, but centred a bit
                const skinStartX = 90, skinGap = 155;
                for (let i = 0; i < 4; i++) {
                    let sx = skinStartX + i * skinGap;
                    let sy = 250, sw = 130, sh = 55;
                    ctx.fillStyle = unlockedSkins[i] ? (i === skinIndex ? '#2ecc71' : '#7f8c8d') : '#2c3e50';
                    ctx.fillRect(sx, sy, sw, sh);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(sx, sy, sw, sh);
                    setFont(11); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                    if (unlockedSkins[i]) {
                        ctx.fillText(skinNames[i], sx + sw/2, sy + 25);
                        if (i === skinIndex) { setFont(9); ctx.fillText('(EQUIPPED)', sx+sw/2, sy+45); }
                    } else {
                        ctx.fillText('🔒', sx + sw/2, sy + 25);
                        setFont(8); ctx.fillText(skinNames[i], sx+sw/2, sy+42);
                    }
                }

                setFont(14); ctx.fillStyle = '#bbb'; ctx.textAlign = 'center';
                ctx.fillText('Beat Easy → Glass', width/2, 360);
                ctx.fillText('Beat Medium → Star', width/2, 390);
                ctx.fillText('Beat Hard → Soccer', width/2, 420);
            }

            function drawEndScreen(msg) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,width,height);
                setFont(30); ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                ctx.fillText(msg, width/2, height/2-20);
                setFont(14); ctx.fillText('Tap to return to menu', width/2, height/2+40);
            }

            function handleMenuClick(mx, my) {
                const btnW = 150, btnH = 50, gap = 50;
                const totalWidth = 3 * btnW + 2 * gap;
                const startX = (width - totalWidth) / 2;
                for (let i = 0; i < 3; i++) {
                    let bx = startX + i * (btnW + gap);
                    let by = 140;
                    if (mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH) {
                        loadLevel(i);
                        return;
                    }
                }
                // Skin buttons
                const skinStartX = 90, skinGap = 155, sw = 130, sh = 55, sy = 250;
                for (let i = 0; i < 4; i++) {
                    let sx = skinStartX + i * skinGap;
                    if (mx >= sx && mx <= sx + sw && my >= sy && my <= sy + sh) {
                        if (unlockedSkins[i]) skinIndex = i;
                        return;
                    }
                }
            }

            let lastTime = performance.now();
            function gameLoop(now) {
                let delta = (now - lastTime) / 1000;
                lastTime = now;
                if (gameState === 'playing') update(delta);

                if (gameState === 'levelComplete' || gameState === 'timeUp') {
                    // After a short delay, tap returns to menu
                    canvas.onpointerdown = (e) => {
                        gameState = 'menu';
                        canvas.onpointerdown = pointerHandler;
                    };
                }

                draw();
                requestAnimationFrame(gameLoop);
            }

            function pointerHandler(e) {
                e.preventDefault();
                const mx = e.offsetX, my = e.offsetY;
                if (gameState === 'menu') handleMenuClick(mx, my);
                else if (gameState === 'playing') {
                    // large hit area for pause button
                    if (mx >= width - 65 && mx <= width - 5 && my >= 5 && my <= 50) togglePause();
                    else attemptFlip();
                }
                else if (gameState === 'paused') togglePause();
            }
            canvas.onpointerdown = pointerHandler;

            function draw() {
                ctx.clearRect(0, 0, width, height);
                if (gameState === 'menu') { drawMenu(); return; }

                drawGradientBackground();
                drawBgStars();

                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i < width; i += 50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }
                for (let j = 0; j < height; j += 50) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(width,j); ctx.stroke(); }

                drawPlatforms();
                drawObstacles();
                drawFinishFlag();
                drawBall();
                drawUI();

                if (gameState === 'levelComplete') drawEndScreen('LEVEL CLEAR!');
                else if (gameState === 'timeUp') drawEndScreen("TIME'S UP!");
            }

            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
