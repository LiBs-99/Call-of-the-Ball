<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Flip – Fixed Landing</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { border: 2px solid white; display: block; background: #111; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width, height = canvas.height;

            // State
            let gameState = 'menu';
            let currentLevel = -1;
            let skinIndex = 0;
            let deathCount = 0;
            let levelTimeLeft = 60;
            let unlockedSkins = [true, false, false, false];

            // Ball
            const ball = {
                x: 120, y: height/2, radius: 20,
                vx: 0, vy: 0, gravityDir: 1,
                grounded: false, angle: 0, canFlip: true
            };
            const gravityStrength = 0.6, maxFallSpeed = 12;

            // World
            let worldOffset = 0, levelLength = 4000, finishX = 3800;
            let platforms = [], obstacles = [];

            // Level data (same rich platforms as before)
            const levelData = [
                // Easy
                [
                    { type:'platform', x:0, y:400, w:180, h:15 }, { type:'platform', x:250, y:320, w:150, h:15 },
                    { type:'platform', x:450, y:240, w:150, h:15 }, { type:'platform', x:700, y:340, w:180, h:15 },
                    { type:'platform', x:950, y:260, w:130, h:15 }, { type:'platform', x:1150, y:180, w:150, h:15 },
                    { type:'platform', x:1400, y:300, w:200, h:15 }, { type:'platform', x:1650, y:220, w:150, h:15 },
                    { type:'platform', x:1850, y:380, w:200, h:15 }, { type:'platform', x:2100, y:280, w:150, h:15 },
                    { type:'platform', x:2350, y:180, w:180, h:15 }, { type:'platform', x:2600, y:320, w:200, h:15 },
                    { type:'platform', x:2900, y:240, w:200, h:15 }, { type:'platform', x:3200, y:350, w:200, h:15 },
                    { type:'obstacle', x:200, y:350, w:25, h:50 }, { type:'obstacle', x:350, y:270, w:25, h:50 },
                    { type:'obstacle', x:550, y:190, w:25, h:50 }, { type:'obstacle', x:800, y:290, w:25, h:50 },
                    { type:'obstacle', x:1050, y:210, w:25, h:50 }, { type:'obstacle', x:1300, y:130, w:25, h:50 },
                    { type:'obstacle', x:1500, y:250, w:25, h:50 }, { type:'obstacle', x:1750, y:170, w:25, h:50 },
                    { type:'obstacle', x:1950, y:330, w:25, h:50 }, { type:'obstacle', x:2200, y:230, w:25, h:50 },
                ],
                // Medium
                [
                    { type:'platform', x:0, y:380, w:160, h:15 }, { type:'platform', x:220, y:300, w:140, h:15 },
                    { type:'platform', x:400, y:220, w:140, h:15 }, { type:'platform', x:600, y:340, w:160, h:15 },
                    { type:'platform', x:820, y:260, w:120, h:15 }, { type:'platform', x:1000, y:180, w:130, h:15 },
                    { type:'platform', x:1200, y:300, w:180, h:15 }, { type:'platform', x:1400, y:220, w:120, h:15 },
                    { type:'platform', x:1600, y:380, w:180, h:15 }, { type:'platform', x:1850, y:280, w:150, h:15 },
                    { type:'platform', x:2050, y:180, w:150, h:15 }, { type:'platform', x:2300, y:300, w:200, h:15 },
                    { type:'platform', x:2550, y:220, w:150, h:15 }, { type:'platform', x:2800, y:350, w:200, h:15 },
                    { type:'platform', x:3100, y:260, w:180, h:15 },
                    { type:'obstacle', x:150, y:330, w:25, h:50 }, { type:'obstacle', x:320, y:250, w:25, h:50 },
                    { type:'obstacle', x:500, y:170, w:25, h:50 }, { type:'obstacle', x:700, y:290, w:25, h:50 },
                    { type:'obstacle', x:900, y:210, w:25, h:50 }, { type:'obstacle', x:1100, y:130, w:25, h:50 },
                    { type:'obstacle', x:1300, y:250, w:25, h:50 }, { type:'obstacle', x:1500, y:170, w:25, h:50 },
                    { type:'obstacle', x:1700, y:330, w:25, h:50 }, { type:'obstacle', x:1950, y:230, w:25, h:50 },
                    { type:'obstacle', x:2150, y:130, w:25, h:50 }, { type:'obstacle', x:2400, y:250, w:25, h:50 },
                    { type:'obstacle', x:2650, y:170, w:25, h:50 }, { type:'obstacle', x:2900, y:300, w:25, h:50 },
                ],
                // Hard
                [
                    { type:'platform', x:0, y:390, w:130, h:15 }, { type:'platform', x:180, y:310, w:100, h:15 },
                    { type:'platform', x:340, y:230, w:100, h:15 }, { type:'platform', x:500, y:350, w:120, h:15 },
                    { type:'platform', x:680, y:260, w:100, h:15 }, { type:'platform', x:830, y:180, w:100, h:15 },
                    { type:'platform', x:980, y:300, w:140, h:15 }, { type:'platform', x:1160, y:220, w:100, h:15 },
                    { type:'platform', x:1300, y:380, w:140, h:15 }, { type:'platform', x:1500, y:280, w:120, h:15 },
                    { type:'platform', x:1680, y:190, w:100, h:15 }, { type:'platform', x:1830, y:330, w:150, h:15 },
                    { type:'platform', x:2050, y:240, w:120, h:15 }, { type:'platform', x:2220, y:150, w:100, h:15 },
                    { type:'platform', x:2400, y:300, w:160, h:15 }, { type:'platform', x:2620, y:220, w:120, h:15 },
                    { type:'platform', x:2800, y:350, w:150, h:15 }, { type:'platform', x:3050, y:260, w:140, h:15 },
                    { type:'obstacle', x:120, y:340, w:22, h:50 }, { type:'obstacle', x:250, y:260, w:22, h:50 },
                    { type:'obstacle', x:400, y:180, w:22, h:50 }, { type:'obstacle', x:560, y:300, w:22, h:50 },
                    { type:'obstacle', x:720, y:210, w:22, h:50 }, { type:'obstacle', x:880, y:130, w:22, h:50 },
                    { type:'obstacle', x:1040, y:250, w:22, h:50 }, { type:'obstacle', x:1200, y:170, w:22, h:50 },
                    { type:'obstacle', x:1370, y:330, w:22, h:50 }, { type:'obstacle', x:1540, y:230, w:22, h:50 },
                    { type:'obstacle', x:1720, y:140, w:22, h:50 }, { type:'obstacle', x:1900, y:280, w:22, h:50 },
                    { type:'obstacle', x:2100, y:190, w:22, h:50 }, { type:'obstacle', x:2270, y:100, w:22, h:50 },
                    { type:'obstacle', x:2450, y:250, w:22, h:50 }, { type:'obstacle', x:2680, y:170, w:22, h:50 },
                    { type:'obstacle', x:2850, y:300, w:22, h:50 }, { type:'obstacle', x:3100, y:210, w:22, h:50 },
                ]
            ];

            // ---------- Input (Pointer only, no double-firing) ----------
            const keys = {};
            window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') { e.preventDefault(); attemptFlip(); } });
            window.addEventListener('keyup', e => keys[e.code] = false);

            canvas.addEventListener('pointerdown', e => {
                e.preventDefault();
                if (gameState === 'menu') handleMenuClick(e.offsetX, e.offsetY);
                else attemptFlip();
            });

            function attemptFlip() {
                if (gameState !== 'playing') return;
                if (!ball.canFlip) return;
                ball.gravityDir *= -1;
                ball.vy = ball.gravityDir * 4;
                ball.canFlip = false;
            }

            // ---------- Level loading ----------
            function loadLevel(levelIndex) {
                currentLevel = levelIndex;
                const data = levelData[levelIndex];
                platforms = data.filter(o => o.type === 'platform').map(o => ({...o}));
                obstacles = data.filter(o => o.type === 'obstacle').map(o => ({...o}));

                ball.vx = [3, 5, 8][levelIndex];
                levelLength = 3500;
                finishX = levelLength - 200;

                ball.x = 120; ball.y = height/2; ball.vy = 0; ball.gravityDir = 1;
                ball.grounded = false; ball.canFlip = true; ball.angle = 0;
                worldOffset = 0; deathCount = 0; levelTimeLeft = 60;
                gameState = 'playing';
            }

            // ---------- Rock-solid collision + landing ----------
            function checkCollisions() {
                ball.grounded = false;
                // Iterate through platforms, handle overlap and landing
                for (let p of platforms) {
                    const platLeft = p.x - worldOffset;
                    const platRight = platLeft + p.w;
                    const platTop = p.y;
                    const platBottom = p.y + p.h;

                    // Circle vs AABB
                    const closestX = Math.max(platLeft, Math.min(ball.x, platRight));
                    const closestY = Math.max(platTop, Math.min(ball.y, platBottom));
                    const dx = ball.x - closestX;
                    const dy = ball.y - closestY;
                    const distSq = dx*dx + dy*dy;
                    if (distSq < ball.radius * ball.radius) {
                        const dist = Math.sqrt(distSq);
                        const overlap = ball.radius - dist;
                        // Push out of platform
                        if (dist > 0) {
                            ball.x += (dx / dist) * overlap;
                            ball.y += (dy / dist) * overlap;
                        }

                        // Determine landing: only if ball is moving toward the platform
                        if (ball.gravityDir === 1) { // falling down – land on top
                            if (ball.vy >= 0 && ball.y - ball.radius <= platTop + 2) {
                                ball.y = platTop - ball.radius;
                                ball.vy = 0;
                                ball.grounded = true;
                            }
                        } else { // gravity up – land on bottom
                            if (ball.vy <= 0 && ball.y + ball.radius >= platBottom - 2) {
                                ball.y = platBottom + ball.radius;
                                ball.vy = 0;
                                ball.grounded = true;
                            }
                        }
                    }
                }

                // Reset flip ability as soon as grounded
                if (ball.grounded) {
                    ball.canFlip = true;
                }

                // Obstacles → death
                for (let o of obstacles) {
                    const ol = o.x - worldOffset, orr = ol + o.w, ot = o.y, ob = o.y + o.h;
                    const cx = Math.max(ol, Math.min(ball.x, orr));
                    const cy = Math.max(ot, Math.min(ball.y, ob));
                    const dx = ball.x - cx, dy = ball.y - cy;
                    if (dx*dx + dy*dy < ball.radius*ball.radius) {
                        deathCount++;
                        resetBall();
                        return;
                    }
                }

                // Bottom death
                if (ball.y + ball.radius > height) {
                    deathCount++;
                    resetBall();
                }
            }

            function resetBall() {
                ball.x = 120; ball.y = height/2; ball.vy = 0; ball.gravityDir = 1;
                ball.grounded = false; ball.canFlip = true; ball.angle = 0; worldOffset = 0;
            }

            // ---------- Update ----------
            function update(deltaTime) {
                if (gameState !== 'playing') return;

                levelTimeLeft -= deltaTime;
                if (levelTimeLeft <= 0) { gameState = 'timeUp'; return; }

                // Movement (player + auto‑scroll)
                if (keys['ArrowLeft'] || keys['KeyA']) ball.x -= 4;
                if (keys['ArrowRight'] || keys['KeyD']) ball.x += 4;
                ball.x += ball.vx;
                if (ball.x < 0) ball.x = 0;
                worldOffset = ball.x - 120;

                // Gravity
                ball.vy += gravityStrength * ball.gravityDir;
                if (Math.abs(ball.vy) > maxFallSpeed) ball.vy = Math.sign(ball.vy) * maxFallSpeed;
                ball.y += ball.vy;

                // Ceiling bump
                if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.vy = 0; }

                ball.angle += ball.vx / ball.radius * ball.gravityDir;

                checkCollisions();

                if (ball.x >= finishX) {
                    gameState = 'levelComplete';
                    if (currentLevel === 0) unlockedSkins[1] = true;
                    if (currentLevel === 1) unlockedSkins[2] = true;
                    if (currentLevel === 2) unlockedSkins[3] = true;
                }
            }

            // ---------- Drawing (includes FLIP READY indicator) ----------
            function drawPlatforms() {
                ctx.fillStyle = '#3498db';
                for (let p of platforms) {
                    const x = p.x - worldOffset;
                    if (x + p.w < 0 || x > width) continue;
                    ctx.fillRect(x, p.y, p.w, p.h);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(x, p.y, p.w, p.h);
                }
            }
            function drawObstacles() {
                ctx.fillStyle = '#e74c3c';
                for (let o of obstacles) {
                    const x = o.x - worldOffset;
                    if (x + o.w < 0 || x > width) continue;
                    ctx.fillRect(x, o.y, o.w, o.h);
                    ctx.strokeStyle = '#fff'; ctx.strokeRect(x, o.y, o.w, o.h);
                }
            }
            function drawFinishFlag() {
                const flagX = finishX - worldOffset;
                if (flagX < -50 || flagX > width+50) return;
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(flagX, 100, 10, 80);
                ctx.beginPath(); ctx.moveTo(flagX, 100); ctx.lineTo(flagX+30, 120); ctx.lineTo(flagX, 140);
                ctx.fillStyle = '#2ecc71'; ctx.fill();
            }
            function drawBall() {
                ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.angle);
                switch(skinIndex) {
                    case 0: drawDefaultBall(); break;
                    case 1: drawGlassBall(); break;
                    case 2: drawStarBall(); break;
                    case 3: drawSoccerBall(); break;
                }
                ctx.restore();
            }
            function drawDefaultBall() {
                let r = ball.radius;
                ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='#f39c12'; ctx.fill();
                ctx.lineWidth=3; ctx.strokeStyle='#2c3e50'; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(r*0.8,0); ctx.strokeStyle='white'; ctx.lineWidth=3; ctx.stroke();
            }
            function drawGlassBall() {
                let r = ball.radius;
                let g = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1,0,0,r);
                g.addColorStop(0,'rgba(255,255,255,0.9)'); g.addColorStop(0.5,'rgba(100,200,255,0.6)'); g.addColorStop(1,'rgba(0,100,200,0.8)');
                ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.stroke();
                ctx.beginPath(); ctx.arc(-r*0.25,-r*0.25,r*0.2,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
            }
            function drawStarBall() {
                let r=ball.radius, spikes=5, outerR=r, innerR=r*0.45, rot=Math.PI/2*3, step=Math.PI/spikes;
                ctx.beginPath();
                for(let i=0;i<spikes;i++){ ctx.lineTo(Math.cos(rot)*outerR, Math.sin(rot)*outerR); rot+=step; ctx.lineTo(Math.cos(rot)*innerR, Math.sin(rot)*innerR); rot+=step; }
                ctx.closePath(); ctx.fillStyle='#f1c40f'; ctx.fill(); ctx.strokeStyle='#2c3e50'; ctx.lineWidth=2; ctx.stroke();
            }
            function drawSoccerBall() {
                let r=ball.radius;
                ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill(); ctx.strokeStyle='black'; ctx.lineWidth=2; ctx.stroke();
                let pentPoints=[];
                for(let i=0;i<5;i++){ let a=(i*2*Math.PI/5)-Math.PI/2; pentPoints.push({x:r*0.4*Math.cos(a), y:r*0.4*Math.sin(a)}); }
                ctx.beginPath(); ctx.moveTo(pentPoints[0].x,pentPoints[0].y); for(let i=1;i<5;i++) ctx.lineTo(pentPoints[i].x,pentPoints[i].y); ctx.closePath(); ctx.fillStyle='black'; ctx.fill();
                pentPoints.forEach(p=>{ let a=Math.atan2(p.y,p.x); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(r*Math.cos(a),r*Math.sin(a)); ctx.strokeStyle='black'; ctx.lineWidth=2; ctx.stroke(); });
            }

            function drawUI() {
                if (gameState !== 'playing') return;
                // Timer
                ctx.font='bold 24px sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='right'; ctx.fillText(`Time: ${Math.ceil(levelTimeLeft)}s`, width-20, 40);
                ctx.textAlign='left'; ctx.fillText(`Deaths: ${deathCount}`, 20, 40);
                // Flip status
                let statusText = ball.canFlip ? 'FLIP READY' : 'IN AIR';
                ctx.font='bold 30px sans-serif';
                ctx.fillStyle = ball.canFlip ? '#2ecc71' : '#e74c3c';
                ctx.textAlign='center';
                ctx.fillText(statusText, width/2, height-30);
            }
            function drawMenu() {
                ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,width,height);
                ctx.font='bold 40px sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText('GRAVITY FLIP', width/2, 80);
                const levelNames=['Easy','Medium','Hard'];
                for(let i=0;i<3;i++){
                    let bx=250+i*200, by=150, bw=160, bh=50;
                    ctx.fillStyle='#4a4'; ctx.fillRect(bx,by,bw,bh); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(bx,by,bw,bh);
                    ctx.font='24px sans-serif'; ctx.fillText(levelNames[i], bx+bw/2, by+35);
                }
                const skinNames=['Default','Glass','Star','Soccer'];
                for(let i=0;i<4;i++){
                    let sx=120+i*160, sy=260, sw=130, sh=60;
                    ctx.fillStyle=unlockedSkins[i]?(i===skinIndex?'#2a2':'#666'):'#444';
                    ctx.fillRect(sx,sy,sw,sh); ctx.strokeStyle='#fff'; ctx.strokeRect(sx,sy,sw,sh);
                    ctx.font='16px sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center';
                    if(unlockedSkins[i]){ ctx.fillText(skinNames[i],sx+sw/2,sy+30); if(i===skinIndex) ctx.fillText('(Equipped)',sx+sw/2,sy+50); }
                    else{ ctx.fillText('🔒',sx+sw/2,sy+30); ctx.fillText(skinNames[i],sx+sw/2,sy+50); }
                }
                ctx.font='20px sans-serif'; ctx.fillStyle='#ccc'; ctx.fillText('Beat Easy → Unlock Glass', width/2,380);
                ctx.fillText('Beat Medium → Unlock Star', width/2,410); ctx.fillText('Beat Hard → Unlock Soccer', width/2,440);
            }
            function drawEndScreen(msg) {
                ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,width,height);
                ctx.font='40px sans-serif'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(msg,width/2,height/2);
                ctx.font='24px sans-serif'; ctx.fillText('Tap to return to menu',width/2,height/2+60);
            }

            function handleMenuClick(mx, my) {
                for(let i=0;i<3;i++){ let bx=250+i*200, by=150, bw=160, bh=50; if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){ loadLevel(i); return; } }
                for(let i=0;i<4;i++){ let sx=120+i*160, sy=260, sw=130, sh=60; if(mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh){ if(unlockedSkins[i]) skinIndex=i; return; } }
            }

            // Main loop
            let lastTime = performance.now();
            function gameLoop(now) {
                let delta = (now - lastTime) / 1000;
                lastTime = now;

                if (gameState === 'playing') update(delta);

                if (gameState === 'levelComplete' || gameState === 'timeUp') {
                    canvas.onpointerdown = () => { gameState = 'menu'; canvas.onpointerdown = pointerHandler; };
                }

                draw();
                requestAnimationFrame(gameLoop);
            }

            function pointerHandler(e) {
                e.preventDefault();
                if (gameState === 'menu') handleMenuClick(e.offsetX, e.offsetY);
                else attemptFlip();
            }
            canvas.onpointerdown = pointerHandler;

            function draw() {
                ctx.clearRect(0, 0, width, height);
                if (gameState === 'menu') { drawMenu(); return; }
                // grid
                ctx.strokeStyle='#333'; ctx.lineWidth=0.5;
                for(let i=0;i<width;i+=50){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }
                for(let j=0;j<height;j+=50){ ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(width,j); ctx.stroke(); }
                drawPlatforms(); drawObstacles(); drawFinishFlag(); drawBall(); drawUI();
                if (gameState === 'levelComplete') drawEndScreen('Level Complete!');
                else if (gameState === 'timeUp') drawEndScreen("Time's Up!");
            }

            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
